<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação de Presença – Jardim Encantado 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:       #d4849a;
    --pink-light: #fce8ef;
    --pink-mid:   #e8a8ba;
    --rose-dark:  #b5637a;
    --lavender:   #c9a8d4;
    --cream:      #fdf6f7;
    --white:      #ffffff;
    --text:       #4a2f3a;
    --muted:      #b89aa4;
    --border:     #f0d8e2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inria Serif', serif;
    font-weight: 700;
    font-style: italic;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
  }

  /* BANNER */
  .banner { width: 100%; overflow: hidden; line-height: 0; }
  .banner img { width: 100%; height: auto; display: block; }

  /* HEADER */
  .header { text-align: center; padding: 24px 20px 10px; }
  .header .tag {
    display: inline-block;
    background: var(--pink-light);
    color: var(--rose-dark);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .header .details {
    color: var(--text);
    font-size: 0.9rem;
    line-height: 1.75;
    margin-top: 6px;
  }
  .header .details .date {
    font-family: 'Inria Serif', serif;
    font-style: italic;
    color: var(--rose-dark);
    font-size: 1.05rem;
    font-weight: 600;
  }
  .header .sub {
    color: var(--muted);
    font-size: 0.84rem;
    margin-top: 12px;
    font-weight: 300;
  }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    max-width: 540px;
    margin: 22px 16px 0;
    box-shadow: 0 8px 40px rgba(180,100,120,0.10);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--lavender), var(--pink), var(--rose-dark));
  }

  /* SECTION TITLE */
  .sec-title {
    font-family: 'Inria Serif', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--rose-dark);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .sec-title::before {
    content: '';
    display: inline-block;
    width: 18px; height: 2px;
    background: var(--pink-mid);
    border-radius: 2px;
  }

  /* FIELDS */
  .field { margin-bottom: 18px; }
  label.lbl {
    display: block;
    font-size: 0.73rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 7px;
  }
  input[type="text"], select {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'Inria Serif', serif;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(212,132,154,0.13);
    background: #fff;
  }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--pink);
    pointer-events: none;
    font-size: 0.85rem;
  }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* PERSON CARD */
  .person-card {
    background: var(--cream);
    border: 1.5px dashed var(--pink-mid);
    border-radius: 16px;
    padding: 20px 18px;
    margin-bottom: 14px;
    animation: slideIn 0.22s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(-8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .person-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }
  .person-label {
    font-family: 'Inria Serif', serif;
    font-size: 1rem;
    color: var(--rose-dark);
    font-weight: 600;
  }
  .remove-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: var(--muted);
    padding: 3px 8px; border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .remove-btn:hover { color: var(--pink); background: var(--pink-light); }

  /* ADD BUTTON */
  .add-btn {
    width: 100%; padding: 13px; background: none;
    border: 1.5px dashed var(--pink); border-radius: 12px;
    color: var(--pink); font-family: 'Inria Serif', serif;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 8px; transition: background 0.2s; margin-top: 4px;
  }
  .add-btn:hover { background: var(--pink-light); }
  .add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* SUBMIT */
  .submit-btn {
    width: 100%; margin-top: 28px; padding: 16px;
    background: linear-gradient(135deg, var(--pink), var(--rose-dark));
    border: none; border-radius: 14px; color: white;
    font-family: 'Inria Serif', serif; font-size: 0.97rem;
    font-weight: 700; cursor: pointer; letter-spacing: 0.03em;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(181,99,122,0.35);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(181,99,122,0.4); }
  .submit-btn:active { transform: translateY(0); }

  /* SUCCESS */
  .success {
    display: none;
    text-align: center;
    padding: 28px 16px 20px;
  }
  .success-photo {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 22px;
    display: block;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @media (max-width: 420px) {
    .card { padding: 24px 18px; }
    .logo-wrap img { width: 170px; }
  }
</style>
</head>
<body>

<div class="banner">
  <img src="banner-jardim.jpg" alt="Jardim Encantado de Laura e Luisa">
</div>

<div class="header">
  <div class="details">
    <div class="date">Sábado, 1 de agosto · 17h00</div>
    Rua Polares, 22 — Jardim Riacho
  </div>
  <p class="sub">Preencha os dados de cada convidado e confirme sua presença 🎀</p>
</div>

<div class="card" id="formCard">

  <div class="sec-title">Confirmação de Presença</div>

  <div id="personList"></div>

  <button class="add-btn" id="addBtn" onclick="addPerson()">
    + Adicionar convidado
  </button>

  <div class="divider"></div>

  <button class="submit-btn" onclick="submitForm()">
    Confirmar Presença &nbsp;🌸
  </button>

  <!-- SUCCESS -->
  <div class="success" id="successMsg">
    <img class="success-photo" src="sucesso-meninas.jpg" alt="Sua presenca foi confirmada!">
  </div>

</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyysdyGppqgbeRRQ1E3TBR7P0kykzsSDxPDXECmgfy2b-hbNhiFuziuwLf-k-PSdcMk/exec';

const MAX = 4;
let count = 0;

const ageOptions = [
  { value: '',       label: 'Selecione a faixa etária' },
  { value: 'adulto', label: '🧑 Adultos e adolescentes (+16 anos)' },
  { value: '12-15',  label: '🧒 Adolescentes de 12 a 15 anos' },
  { value: '6-11',   label: '👦 Crianças de 6 a 11 anos' },
  { value: '0-5',    label: '👶 Crianças até 5 anos' },
];

function buildOpts() {
  return ageOptions.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
}

function addPerson() {
  if (document.querySelectorAll('.person-card').length >= MAX) return;
  count++;
  const idx = document.querySelectorAll('.person-card').length + 1;
  const isFirst = idx === 1;

  const div = document.createElement('div');
  div.className = 'person-card';
  div.id = `person-${count}`;
  div.innerHTML = `
    <div class="person-header">
      <span class="person-label" id="lbl-${count}">Convidado ${idx}</span>
      ${!isFirst ? `<button class="remove-btn" onclick="removePerson(${count})" title="Remover">✕</button>` : ''}
    </div>
    <div class="field">
      <label class="lbl">Nome completo</label>
      <input type="text" placeholder="Ex: Maria Silva" class="p-name">
    </div>
    <div class="field">
      <label class="lbl">Faixa etária</label>
      <div class="select-wrap">
        <select class="p-age">${buildOpts()}</select>
      </div>
    </div>
  `;
  document.getElementById('personList').appendChild(div);
  updateBtn();
}

function removePerson(id) {
  document.getElementById(`person-${id}`)?.remove();
  renumber();
  updateBtn();
}

function renumber() {
  document.querySelectorAll('.person-card').forEach((card, i) => {
    const lbl = card.querySelector('[id^="lbl-"]');
    if (lbl) lbl.textContent = `Convidado ${i + 1}`;
  });
}

function updateBtn() {
  const total = document.querySelectorAll('.person-card').length;
  document.getElementById('addBtn').disabled = total >= MAX;
}

function submitForm() {
  const cards = document.querySelectorAll('.person-card');
  if (!cards.length) { alert('Adicione ao menos um convidado.'); return; }

  let valid = true;
  const guests = [];
  const ageLabels = {
    'adulto': 'Adultos e adolescentes (+16 anos)',
    '12-15':  'Adolescentes de 12 a 15 anos',
    '6-11':   'Criancas de 6 a 11 anos',
    '0-5':    'Criancas ate 5 anos'
  };

  cards.forEach((c, i) => {
    const name = c.querySelector('.p-name').value.trim();
    const age  = c.querySelector('.p-age').value;
    if (!name || !age) {
      alert('Preencha nome e faixa etaria do Convidado ' + (i + 1) + '.');
      valid = false;
    } else {
      guests.push({ name: name, age: ageLabels[age] || age });
    }
  });
  if (!valid) return;

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const params = 'data=' + encodeURIComponent(JSON.stringify({ guests: guests }));
  const xhr = new XMLHttpRequest();
  xhr.open('POST', SHEET_URL, true);
  xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) { showSuccess(); }
  };
  xhr.onerror = function() { showSuccess(); };
  xhr.send(params);
  setTimeout(function() { showSuccess(); }, 4000);
}

function showSuccess() {
  if (showSuccess.called) return;
  showSuccess.called = true;
  document.querySelectorAll('.card > *:not(.success)').forEach(el => el.style.display = 'none');
  document.getElementById('successMsg').style.display = 'block';
}

addPerson();
updateBtn();
</script>
</body>
</html>
